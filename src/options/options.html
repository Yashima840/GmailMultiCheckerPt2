<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Gmail Multi Checker - 設定</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <h1>Gmail Multi Checker 設定</h1>

    <section>
      <h2>1. Google Cloud の情報(初回のみ)</h2>
      <p class="hint">
        セットアップ手順は同梱の <code>SETUP.md</code> を参照してください。
        OAuthクライアント作成時に、下記のリダイレクトURIを登録します。
      </p>
      <div class="field">
        <label>リダイレクトURI(コピーしてGoogle Cloudに登録)</label>
        <div class="row">
          <input id="redirect-uri" type="text" readonly />
          <button id="copy-redirect" class="btn">コピー</button>
        </div>
      </div>
      <div class="field">
        <label for="client-id">クライアントID</label>
        <input id="client-id" type="text" placeholder="xxxxx.apps.googleusercontent.com" />
      </div>
      <div class="field">
        <label for="client-secret">クライアントシークレット</label>
        <input id="client-secret" type="password" placeholder="GOCSPX-..." />
      </div>
      <div class="field row">
        <div>
          <label for="poll-minutes">確認間隔(分)</label>
          <input id="poll-minutes" type="number" min="1" max="60" />
        </div>
        <div>
          <label for="max-results">表示件数/アカウント</label>
          <input id="max-results" type="number" min="5" max="100" />
        </div>
      </div>
      <div class="row">
        <button id="btn-save" class="btn primary">設定を保存</button>
        <span id="save-status" class="status"></span>
      </div>
    </section>

    <section>
      <h2>2. アカウント</h2>
      <p class="hint">
        「アカウント追加」を押すとGoogleのログイン画面が開きます。
        未検証アプリの警告が出た場合は「詳細」→「(アプリ名)に移動」で続行してください。
        再認証もこのボタンから同じアカウントでログインし直すだけです。
      </p>
      <div class="row">
        <button id="btn-add-account" class="btn primary">アカウント追加</button>
        <span id="add-status" class="status"></span>
      </div>
      <div id="account-list"></div>
    </section>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
